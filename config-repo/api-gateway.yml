server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: crop-inventory-service
          uri: lb://CROP-INVENTORY-SERVICE
          predicates:
            - Path=/api/crops/**