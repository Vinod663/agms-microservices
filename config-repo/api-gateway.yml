server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

spring:
  cloud:
    gateway:
      routes:
        - id: crop-inventory-service
          uri: lb://CROP-INVENTORY-SERVICE
          predicates:
            - name: Path
              args:
                patterns:
                  - /api/crops
                  - /api/crops/**

        - id: zone-management-service
          uri: lb://ZONE-MANAGEMENT-SERVICE
          predicates:
            - name: Path
              args:
                patterns:
                  - /api/zones
                  - /api/zones/**

        - id: sensor-telemetry-service
          uri: lb://SENSOR-TELEMETRY-SERVICE
          predicates:
            - name: Path
              args:
                patterns:
                  - /api/sensors
                  - /api/sensors/**

        - id: automation-control-service
          uri: lb://AUTOMATION-CONTROL-SERVICE
          predicates:
            - name: Path
              args:
                patterns:
                  - /api/automation
                  - /api/automation/**

